name: Gerar e publicar páginas estáticas

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: |
          pip install -r app/requirements.txt

      - name: Rodar script para gerar HTML
        run: |
          python app/main.py

      - name: Publicar na branch gh-pages
        run: |
          cd output
          git init
          git config user.name "fabiowakisaka"
          git config user.email "fabio_wakisaka@yahoo.com.br"
          git remote add origin https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git fetch origin
          
          # Verifica se a branch já existe e alterna para ela
          git checkout gh-pages || git checkout -b gh-pages
          
          git add .
          git commit -m "Deploy automático para GitHub Pages"
          git push origin gh-pages --force
