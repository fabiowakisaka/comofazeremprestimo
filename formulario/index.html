<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerar Página Estática</title>
</head>
<body>
    <h1>Digite um termo para gerar uma página:</h1>
    <form id="search-form">
        <input type="text" id="termo" placeholder="Ex: iPhone 14" required />
        <button type="submit">Gerar Página</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById("search-form").addEventListener("submit", function(event) {
            event.preventDefault();

            const termo = document.getElementById("termo").value;
            const resultDiv = document.getElementById("result");

            // Fazendo uma requisição fetch para o backend (substitua pela URL de seu servidor)
            fetch("/gerar-pagina", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ termo: termo }),
            })
            .then(response => response.json())
            .then(data => {
                resultDiv.innerHTML = `<p>Página gerada: <a href="${data.link}">${data.link}</a></p>`;
            })
            .catch(error => {
                resultDiv.innerHTML = `<p>Erro ao enviar solicitação: ${error.message}</p>`;
            });
        });
    </script>
</body>
</html>
